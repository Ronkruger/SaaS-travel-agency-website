[www]
user = www-data
group = www-data

listen = 127.0.0.1:9000

; Dynamic process management with enough workers to handle:
;  - SSE long-polling connections (1 worker each, ~20 s)
;  - Xendit webhook POSTs and normal web requests concurrently
pm = dynamic
pm.max_children     = 20
pm.start_servers    = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 8
pm.max_requests     = 500

; Prevent zombie workers if a request stalls.
; Set to 300 s to match nginx fastcgi_read_timeout — tenant registration runs
; CreateDatabase + MigrateDatabase + SeedDatabase synchronously and can take
; 60-120 s on Railway MySQL.
request_terminate_timeout = 300
